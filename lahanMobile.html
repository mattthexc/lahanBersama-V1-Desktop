<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LahanBersama - Mobile App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine JS -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Sembunyikan scrollbar agar rapi seperti aplikasi Native */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #e2e8f0; }
        /* Animasi Bottom Sheet */
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="font-sans text-slate-800 antialiased" x-data="lahanApp()">

    <!-- MOBILE APP WRAPPER (Tampilan dibatasi seukuran layar HP) -->
    <div class="w-full max-w-[430px] mx-auto bg-[#F8FAFC] min-h-[100dvh] relative shadow-2xl sm:border-x sm:border-slate-200 overflow-hidden flex flex-col">

        <!-- TOP HEADER -->
        <header x-show="!selectedLand" class="bg-white/90 backdrop-blur-xl px-6 py-4 sticky top-0 z-40 border-b border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <i data-lucide="leaf" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-0.5">Selamat Pagi,</p>
                    <h2 class="text-sm font-black text-slate-800 leading-none" x-text="username"></h2>
                </div>
            </div>
            <button @click="toggleRole" class="bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-xl text-[10px] font-bold border border-emerald-100 flex items-center gap-1 active:scale-95 transition-transform">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> <span x-text="role === 'investor' ? 'Pendana' : 'Petani'"></span>
            </button>
        </header>

        <!-- MAIN SCROLLABLE CONTENT -->
        <main class="flex-1 overflow-y-auto px-5 pt-6 pb-28" id="main-scroll">
            
            <!-- TAB: PASAR LAHAN -->
            <div x-show="activeTab === 'marketplace' && !selectedLand" class="animate-in fade-in duration-300">
                <div class="mb-6">
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-1">Eksplorasi</h1>
                    <p class="text-slate-500 text-sm font-medium">Temukan lahan dan mulai mendanai.</p>
                </div>
                <div class="space-y-5">
                    <template x-for="land in lands.filter(l => l.status === 'available')" :key="land.id">
                        <div @click="openLandDetail(land)" class="bg-white rounded-[1.8rem] p-2.5 shadow-sm border border-slate-100 active:scale-[0.98] transition-transform cursor-pointer">
                            <div class="relative h-44 rounded-[1.2rem] overflow-hidden">
                                <img :src="land.image" alt="Lahan" class="w-full h-full object-cover" />
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-80"></div>
                                <div class="absolute top-3 right-3">
                                    <span class="px-3 py-1 rounded-full text-[10px] font-black shadow-lg backdrop-blur-md bg-white/90 text-emerald-700">TERBUKA</span>
                                </div>
                                <div class="absolute bottom-3 left-3 right-3">
                                    <h3 class="font-bold text-lg text-white line-clamp-1 shadow-sm" x-text="land.owner"></h3>
                                    <div class="flex items-center gap-1.5 text-[11px] text-slate-200 font-medium mt-1">
                                        <i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="`${land.location} • ${land.size}`"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="p-3.5">
                                <div class="flex justify-between items-end mb-2">
                                    <div>
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Target Dana</p>
                                        <span class="text-base font-black text-slate-800" x-text="formatRupiah(land.targetFund)"></span>
                                    </div>
                                    <span class="text-xs font-black text-emerald-600" x-text="`${Math.round((land.currentFund / land.targetFund) * 100)}%`"></span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                    <div class="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full" :style="`width: ${(land.currentFund / land.targetFund) * 100}%`"></div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- TAB: LAHAN SAYA -->
            <div x-show="activeTab === 'my-lands' && !selectedLand" class="animate-in fade-in duration-300">
                <div class="mb-6 flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-1">Lahan Saya</h1>
                        <p class="text-slate-500 text-sm font-medium">Kelola aset pertanian Anda.</p>
                    </div>
                    <button @click="showAddLandModal = true" class="bg-slate-900 text-white w-10 h-10 rounded-2xl flex items-center justify-center hover:bg-slate-800 shadow-lg active:scale-95 transition-transform">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <div class="space-y-5">
                     <template x-for="land in lands.filter(l => l.owner === username || l.owner === 'Saya' || l.owner === 'Bapak Budi')" :key="land.id">
                        <div @click="openLandDetail(land)" class="bg-white rounded-[1.8rem] p-2.5 shadow-sm border border-slate-100 active:scale-[0.98] transition-transform cursor-pointer">
                            <div class="relative h-44 rounded-[1.2rem] overflow-hidden">
                                <img :src="land.image" alt="Lahan" class="w-full h-full object-cover" />
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-80"></div>
                                <div class="absolute top-3 right-3">
                                    <span :class="land.status === 'available' ? 'bg-white/90 text-emerald-700' : 'bg-blue-500/90 text-white'" class="px-3 py-1 rounded-full text-[10px] font-black shadow-lg backdrop-blur-md" x-text="land.status === 'available' ? 'TERBUKA' : 'BERJALAN'"></span>
                                </div>
                                <div class="absolute bottom-3 left-3 right-3">
                                    <h3 class="font-bold text-lg text-white line-clamp-1 shadow-sm" x-text="land.owner"></h3>
                                    <div class="flex items-center gap-1.5 text-[11px] text-slate-200 font-medium mt-1">
                                        <i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="`${land.location} • ${land.size}`"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="p-3.5">
                                <template x-if="land.status === 'funded' && land.cropType">
                                    <div class="bg-emerald-50/50 text-emerald-800 px-3 py-2 rounded-xl text-xs flex items-center gap-2 mb-3 border border-emerald-100/50 font-bold">
                                        <div class="bg-emerald-100 p-1 rounded text-emerald-600"><i data-lucide="sprout" class="w-3.5 h-3.5"></i></div>
                                        <span class="line-clamp-1" x-text="land.cropType"></span>
                                    </div>
                                </template>
                                <div class="flex justify-between items-end mb-2">
                                    <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Kebutuhan Dana</p><span class="text-base font-black text-slate-800" x-text="formatRupiah(land.targetFund)"></span></div>
                                    <span class="text-xs font-black text-emerald-600" x-text="`${Math.round((land.currentFund / land.targetFund) * 100)}%`"></span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                    <div class="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full" :style="`width: ${(land.currentFund / land.targetFund) * 100}%`"></div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- TAB: PORTOFOLIO -->
            <div x-show="activeTab === 'my-investments' && !selectedLand" class="animate-in fade-in duration-300">
                <div class="mb-6">
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-1">Portofolio</h1>
                    <p class="text-slate-500 text-sm font-medium">Pantau aset yang Anda danai.</p>
                </div>
                <div class="space-y-5">
                     <template x-for="land in lands.filter(l => l.status === 'funded')" :key="land.id">
                        <div @click="openLandDetail(land)" class="bg-white rounded-[1.8rem] p-2.5 shadow-sm border border-slate-100 active:scale-[0.98] transition-transform cursor-pointer">
                            <div class="relative h-44 rounded-[1.2rem] overflow-hidden">
                                <img :src="land.image" alt="Lahan" class="w-full h-full object-cover" />
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-80"></div>
                                <div class="absolute top-3 right-3">
                                    <span class="bg-blue-500/90 text-white px-3 py-1 rounded-full text-[10px] font-black shadow-lg backdrop-blur-md">BERJALAN</span>
                                </div>
                                <div class="absolute bottom-3 left-3 right-3">
                                    <h3 class="font-bold text-lg text-white line-clamp-1 shadow-sm" x-text="land.owner"></h3>
                                    <div class="flex items-center gap-1.5 text-[11px] text-slate-200 font-medium mt-1">
                                        <i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="`${land.location} • ${land.size}`"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="p-3.5">
                                <template x-if="land.cropType">
                                    <div class="bg-emerald-50/50 text-emerald-800 px-3 py-2 rounded-xl text-xs flex items-center gap-2 mb-3 border border-emerald-100/50 font-bold">
                                        <div class="bg-emerald-100 p-1 rounded text-emerald-600"><i data-lucide="sprout" class="w-3.5 h-3.5"></i></div>
                                        <span class="line-clamp-1" x-text="land.cropType"></span>
                                    </div>
                                </template>
                                <div class="flex justify-between items-end mb-2">
                                    <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Dana Disuntik</p><span class="text-base font-black text-slate-800" x-text="formatRupiah(land.targetFund)"></span></div>
                                    <span class="text-xs font-black text-emerald-600">100%</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                    <div class="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full" style="width: 100%"></div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="lands.filter(l => l.status === 'funded').length === 0">
                        <div class="bg-white border border-slate-200 border-dashed rounded-[2rem] p-10 text-center flex flex-col items-center justify-center mt-10">
                            <i data-lucide="wallet" class="w-10 h-10 text-slate-300 mb-3"></i>
                            <h3 class="text-base font-bold text-slate-600 mb-1">Belum Ada Investasi</h3>
                            <p class="text-slate-400 text-xs mb-5 font-medium">Mulai danai lahan hari ini.</p>
                            <button @click="activeTab = 'marketplace'" class="bg-emerald-100 text-emerald-700 px-5 py-2.5 rounded-xl text-sm font-bold active:bg-emerald-200 transition-colors">Cari Lahan</button>
                        </div>
                    </template>
                </div>
            </div>

            <!-- VIEW: DETAIL LAHAN -->
            <div x-show="selectedLand" class="absolute inset-0 bg-[#F8FAFC] z-50 overflow-y-auto pb-32 animate-in slide-in-from-right-8 duration-300">
                <!-- Image Header -->
                <div class="relative h-[45vh] w-full">
                    <img :src="selectedLand?.image" alt="Lahan" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-b from-slate-900/60 via-transparent to-slate-900/80"></div>
                    
                    <button @click="selectedLand = null" class="absolute top-6 left-5 bg-white/20 backdrop-blur-xl text-white p-3 rounded-full active:scale-95 transition-all">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </button>
                    <button class="absolute top-6 right-5 bg-white/20 backdrop-blur-xl text-white p-3 rounded-full active:scale-95 transition-all">
                        <i data-lucide="share-2" class="w-5 h-5"></i>
                    </button>

                    <div class="absolute bottom-10 left-6 right-6">
                        <div class="flex items-center gap-2 mb-2">
                            <span :class="selectedLand?.status === 'available' ? 'bg-emerald-500 text-white' : 'bg-blue-500 text-white'" class="px-3 py-1 rounded-full text-[10px] font-black shadow-lg" x-text="selectedLand?.status === 'available' ? 'TERBUKA' : 'BERJALAN'"></span>
                            <span class="flex items-center gap-1 text-xs text-slate-200 font-medium">
                                <i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="selectedLand?.location"></span>
                            </span>
                        </div>
                        <h1 class="text-3xl font-black text-white tracking-tight mb-1" x-text="`Lahan ${selectedLand?.owner || ''}`"></h1>
                        <p class="text-slate-300 text-sm font-medium flex items-center gap-1.5">Luas: <span class="text-white font-bold" x-text="selectedLand?.size"></span></p>
                    </div>
                </div>

                <div class="relative z-10 bg-[#F8FAFC] -mt-6 rounded-t-[2rem] px-6 py-8 space-y-6">
                    
                    <!-- Funding Status -->
                    <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 p-5">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Target Dana</p>
                        <h2 class="text-3xl font-black text-slate-800 mb-4" x-text="formatRupiah(selectedLand?.targetFund)"></h2>
                        
                        <div class="w-full bg-slate-100 rounded-full h-2.5 mb-2">
                            <div class="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full" :style="`width: ${((selectedLand?.currentFund || 0) / (selectedLand?.targetFund || 1)) * 100}%`"></div>
                        </div>
                        <div class="flex justify-between text-xs font-bold text-slate-500">
                            <span class="text-emerald-600" x-text="`Terkumpul ${formatRupiah(selectedLand?.currentFund)}`"></span>
                            <span>100%</span>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 p-6">
                        <h3 class="text-base font-black text-slate-800 mb-3 flex items-center gap-2">
                            <i data-lucide="info" class="w-5 h-5 text-slate-400"></i> Detail Lahan
                        </h3>
                        <p class="text-slate-600 text-sm leading-relaxed" x-text="selectedLand?.description"></p>
                        
                        <template x-if="selectedLand?.phone">
                            <a :href="`https://wa.me/${selectedLand?.phone}`" target="_blank" class="mt-5 w-full bg-emerald-50 text-emerald-700 py-3.5 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 active:bg-emerald-100">
                                <i data-lucide="message-circle" class="w-4 h-4"></i> Chat Pemilik
                            </a>
                        </template>
                    </div>

                    <!-- Timeline Jurnal -->
                    <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-base font-black text-slate-800 flex items-center gap-2">
                                <i data-lucide="calendar" class="w-5 h-5 text-emerald-500"></i> Jurnal Proyek
                            </h3>
                            <template x-if="role === 'landowner' && selectedLand?.status === 'funded'">
                                <button @click="showUpdateModal = true" class="bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-lg font-bold text-[11px] flex items-center gap-1 active:bg-emerald-100">
                                    <i data-lucide="camera" class="w-3 h-3"></i> Update
                                </button>
                            </template>
                        </div>
                        
                        <div class="space-y-6 relative before:absolute before:inset-0 before:ml-4 before:-translate-x-px before:h-full before:w-0.5 before:bg-slate-100">
                            <template x-if="selectedLand && selectedLand.updates && selectedLand.updates.length > 0">
                                <template x-for="(update, idx) in selectedLand.updates" :key="idx">
                                    <div class="relative flex items-start gap-4">
                                        <div class="w-8 h-8 rounded-full border-4 border-white bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0 z-10 mt-0.5">
                                            <i data-lucide="check" class="w-3 h-3"></i>
                                        </div>
                                        <div class="flex-1 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <time class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1.5 block" x-text="update.date"></time>
                                            <p class="text-slate-600 text-xs leading-relaxed mb-3 font-medium" x-text="update.text"></p>
                                            <template x-if="update.image">
                                                <img :src="update.image" class="w-full h-32 object-cover rounded-xl" />
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </template>
                            <template x-if="!selectedLand?.updates || selectedLand.updates.length === 0">
                                <div class="text-center py-6 relative z-10 pl-6">
                                    <p class="text-slate-400 text-xs font-medium italic">Belum ada progres tercatat.</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Sticky Bottom Action Bar -->
                <div x-show="selectedLand?.status === 'available' && role === 'investor'" class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 z-50">
                    <button @click="showFundModal = true" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-base active:bg-slate-800 shadow-xl shadow-slate-900/20 flex justify-center items-center gap-2 transform active:scale-[0.98] transition-all">
                        <i data-lucide="wallet" class="w-5 h-5"></i> Danai Sekarang
                    </button>
                </div>
            </div>
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav x-show="!selectedLand" class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-white/95 backdrop-blur-2xl border-t border-slate-100/60 z-40 rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)]">
            <div class="flex justify-around items-center px-6 py-2 pb-5 pt-3">
                <button @click="activeTab = 'marketplace'" class="flex flex-col items-center justify-center w-16 h-14 relative">
                    <div :class="activeTab === 'marketplace' ? 'text-emerald-600 scale-110' : 'text-slate-400'" class="transition-all duration-300">
                        <i data-lucide="compass" class="w-6 h-6"></i>
                    </div>
                    <span :class="activeTab === 'marketplace' ? 'text-emerald-600 font-bold opacity-100' : 'text-transparent opacity-0'" class="text-[10px] mt-1 transition-all duration-300 absolute bottom-0 translate-y-4">Pasar</span>
                </button>
                
                <button x-show="role === 'landowner'" @click="activeTab = 'my-lands'" class="flex flex-col items-center justify-center w-16 h-14 relative">
                    <div :class="activeTab === 'my-lands' ? 'text-emerald-600 scale-110' : 'text-slate-400'" class="transition-all duration-300">
                        <i data-lucide="map" class="w-6 h-6"></i>
                    </div>
                    <span :class="activeTab === 'my-lands' ? 'text-emerald-600 font-bold opacity-100' : 'text-transparent opacity-0'" class="text-[10px] mt-1 transition-all duration-300 absolute bottom-0 translate-y-4">Lahan</span>
                </button>

                <button x-show="role === 'investor'" @click="activeTab = 'my-investments'" class="flex flex-col items-center justify-center w-16 h-14 relative">
                    <div :class="activeTab === 'my-investments' ? 'text-emerald-600 scale-110' : 'text-slate-400'" class="transition-all duration-300">
                        <i data-lucide="pie-chart" class="w-6 h-6"></i>
                    </div>
                    <span :class="activeTab === 'my-investments' ? 'text-emerald-600 font-bold opacity-100' : 'text-transparent opacity-0'" class="text-[10px] mt-1 transition-all duration-300 absolute bottom-0 translate-y-4">Aset</span>
                </button>
            </div>
        </nav>

        <!-- MODAL BOTTOM SHEETS -->
        <div x-show="showFundModal" class="fixed inset-0 z-[100] max-w-[430px] mx-auto flex flex-col justify-end" style="display: none;">
            <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" @click="showFundModal = false"></div>
            <div class="relative w-full bg-white rounded-t-[2rem] shadow-2xl slide-up flex flex-col max-h-[90vh]">
                <div class="w-full flex justify-center pt-3 pb-2"><div class="w-12 h-1.5 bg-slate-200 rounded-full"></div></div>
                <div class="px-6 pb-4 border-b border-slate-100">
                    <h3 class="text-xl font-black text-slate-800">Inisiasi Dana</h3>
                </div>
                <div class="px-6 py-4 overflow-y-auto flex-1 custom-scrollbar">
                    <div class="space-y-3 mb-6">
                        <template x-for="crop in cropOptions" :key="crop.id">
                            <label :class="selectedCrop === crop.id ? 'border-emerald-500 bg-emerald-50/50' : 'border-slate-100'" class="flex items-center p-3.5 rounded-2xl cursor-pointer transition-all border-2 active:scale-[0.98]">
                                <input type="radio" name="crop" :value="crop.id" x-model="selectedCrop" class="hidden" />
                                <div :class="selectedCrop === crop.id ? 'border-emerald-500' : 'border-slate-300'" class="w-5 h-5 rounded-full border-2 flex items-center justify-center mr-3 shrink-0">
                                    <div x-show="selectedCrop === crop.id" class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></div>
                                </div>
                                <div class="flex-1">
                                    <div class="font-bold text-sm text-slate-800" x-text="crop.name"></div>
                                    <div class="text-[10px] font-bold text-emerald-600 mt-0.5" x-text="`${formatRupiah(crop.price)}/bibit`"></div>
                                </div>
                            </label>
                        </template>
                    </div>
                    <template x-if="selectedCrop">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-2">
                            <label class="block text-xs font-bold text-slate-700 mb-2">Jumlah Bibit</label>
                            <input type="number" min="1" x-model="quantity" class="w-full border border-slate-200 bg-white rounded-xl p-3 outline-none mb-3 font-bold text-base" />
                        </div>
                    </template>
                </div>
                <div class="p-4 bg-white border-t border-slate-100 pb-8">
                    <button @click="handleFund" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm active:bg-slate-800 shadow-xl shadow-slate-900/20">Konfirmasi Dana</button>
                </div>
            </div>
        </div>

        <!-- MODAL TAMBAH LAHAN -->
        <div x-show="showAddLandModal" class="fixed inset-0 z-[100] max-w-[430px] mx-auto flex flex-col justify-end" style="display: none;">
            <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" @click="showAddLandModal = false"></div>
            <div class="relative w-full bg-white rounded-t-[2rem] shadow-2xl slide-up flex flex-col max-h-[95vh]">
                <div class="w-full flex justify-center pt-3 pb-2"><div class="w-12 h-1.5 bg-slate-200 rounded-full"></div></div>
                <div class="px-6 pb-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-xl font-black text-slate-800">Daftar Lahan</h3>
                    <button @click="showAddLandModal = false" class="bg-slate-100 p-2 rounded-full text-slate-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="px-6 py-5 overflow-y-auto flex-1 custom-scrollbar">
                    <form id="addLandForm" @submit.prevent="handleAddLand" class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Lokasi</label>
                                <input required x-model="newLandLoc" type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none font-medium text-sm" placeholder="Cth: Sukabumi" />
                            </div>
                            <div class="col-span-1">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Luas</label>
                                <input required x-model="newLandSize" type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none font-medium text-sm" placeholder="1 Hektar" />
                            </div>
                            <div class="col-span-1">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Target (Rp)</label>
                                <input required x-model="newLandFund" type="number" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none font-medium text-sm" placeholder="5000000" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">Deskripsi</label>
                            <textarea required x-model="newLandDesc" rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none font-medium text-sm resize-none" placeholder="Ceritakan keunggulan tanah ini..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="p-4 bg-white border-t border-slate-100 pb-8">
                    <button type="submit" form="addLandForm" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm active:bg-slate-800 shadow-xl shadow-slate-900/20">Publikasi Sekarang</button>
                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPT ALPINE JS (Dipisah agar 100% Kebal Error) -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('lahanApp', () => ({
                isLoggedIn: true, // Bypass Login untuk Import Figma
                username: 'Bapak Ahmad',
                role: 'investor',
                activeTab: 'marketplace',
                lands: [
                    { id: 1, owner: 'Bapak Budi', phone: '6281234567890', location: 'Cisarua, Bogor', size: '500 m²', description: 'Lahan subur bekas kebun sayur, cocok untuk tanaman palawija.', image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'available', targetFund: 5000000, currentFund: 0, updates: [] },
                    { id: 2, owner: 'Ibu Siti', phone: '6289876543210', location: 'Lembang, Bandung', size: '1000 m²', description: 'Lahan dataran tinggi, cocok sayuran daun. Udara sejuk.', image: 'https://images.unsplash.com/photo-1592982537447-6f2a6a0a38b5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'funded', targetFund: 10000000, currentFund: 10000000, cropType: 'Tomat Cherry (800 bibit)', updates: [{ date: '2026-03-20', text: 'Benih disemai di polybag.'}] },
                    { id: 3, owner: 'Mang Oleh', phone: '6289876543211', location: 'Garut, Jabar', size: '2000 m²', description: 'Tanah gembur, dekat mata air. Cocok untuk cabai atau jagung.', image: 'https://images.unsplash.com/photo-1605000797499-95a51c5269ae?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'available', targetFund: 15000000, currentFund: 3500000, updates: [] }
                ],
                selectedLand: null,
                showFundModal: false, showAddLandModal: false, showUpdateModal: false,
                newLandLoc: '', newLandSize: '', newLandFund: '', newLandDesc: '',
                selectedCrop: 'c1', quantity: 100, updateText: '',
                cropOptions: [
                    { id: 'c1', name: 'Jagung Manis', price: 15000 },
                    { id: 'c2', name: 'Cabai Rawit', price: 20000 },
                    { id: 'c3', name: 'Tomat Cherry', price: 12000 }
                ],
                
                init() { 
                    this.$watch('activeTab', () => this.refreshIcons()); 
                    this.$watch('selectedLand', () => this.refreshIcons());
                },
                refreshIcons() {
                    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50);
                },
                toggleRole() {
                    this.role = this.role === 'investor' ? 'landowner' : 'investor';
                    this.activeTab = this.role === 'investor' ? 'marketplace' : 'my-lands';
                },
                openLandDetail(land) { this.selectedLand = land; },
                formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0); },
                calculateInvestment() {
                    const crop = this.cropOptions.find(c => c.id === this.selectedCrop);
                    return crop ? crop.price * this.quantity : 0;
                },
                handleFund() {
                    if (!this.selectedCrop || this.quantity < 1) return;
                    const cropDetail = this.cropOptions.find(c => c.id === this.selectedCrop);
                    const totalInvestasi = this.calculateInvestment();
                    const landIndex = this.lands.findIndex(l => l.id === this.selectedLand.id);
                    
                    this.lands[landIndex].status = 'funded';
                    this.lands[landIndex].currentFund = totalInvestasi;
                    this.lands[landIndex].targetFund = totalInvestasi > this.lands[landIndex].targetFund ? totalInvestasi : this.lands[landIndex].targetFund;
                    this.lands[landIndex].cropType = `${cropDetail.name} (${this.quantity} bibit)`;
                    this.lands[landIndex].updates.unshift({ date: new Date().toISOString().split('T')[0], text: 'Pendanaan disalurkan.' });

                    this.showFundModal = false;
                    this.selectedLand = null;
                    this.activeTab = 'my-investments';
                },
                handleUpdateProgress() {
                    if (!this.updateText) return;
                    const newUpdate = { date: new Date().toISOString().split('T')[0], text: this.updateText };
                    const landIndex = this.lands.findIndex(l => l.id === this.selectedLand.id);
                    this.lands[landIndex].updates.unshift(newUpdate);
                    this.selectedLand = this.lands[landIndex];
                    this.showUpdateModal = false;
                    this.updateText = '';
                },
                handleAddLand() {
                    this.lands.push({
                        id: Date.now(), owner: this.username, phone: '6280000000000', location: this.newLandLoc, size: this.newLandSize, description: this.newLandDesc,
                        image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3',
                        status: 'available', targetFund: parseInt(this.newLandFund), currentFund: 0, cropType: null, updates: []
                    });
                    this.showAddLandModal = false;
                    this.newLandLoc = ''; this.newLandSize = ''; this.newLandFund = ''; this.newLandDesc = '';
                }
            }));
        });
        document.addEventListener('DOMContentLoaded', () => { if(window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
