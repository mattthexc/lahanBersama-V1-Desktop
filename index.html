<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LahanBersama - Mobile App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('lahanApp', () => ({
                isLoggedIn: false, // Dimulai dari halaman Login
                isRegistering: false,
                username: '',
                role: 'investor',
                activeTab: 'marketplace',
                lands: [
                    { id: 1, owner: 'Bapak Budi', phone: '6281234567890', location: 'Cisarua, Bogor', size: '500 m²', description: 'Lahan subur bekas kebun sayur, cocok untuk tanaman palawija.', image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'available', targetFund: 5000000, currentFund: 0, updates: [] },
                    { id: 2, owner: 'Ibu Siti', phone: '6289876543210', location: 'Lembang, Bandung', size: '1000 m²', description: 'Lahan dataran tinggi, cocok sayuran daun. Udara sejuk.', image: 'https://images.unsplash.com/photo-1592982537447-6f2a6a0a38b5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'funded', targetFund: 10000000, currentFund: 10000000, cropType: 'Tomat Cherry (800 bibit)', updates: [{ date: '2026-03-20', text: 'Benih disemai di polybag.'}] },
                    { id: 3, owner: 'Mang Oleh', phone: '6289876543211', location: 'Garut, Jabar', size: '2000 m²', description: 'Tanah gembur, dekat mata air. Cocok untuk cabai atau jagung.', image: 'https://images.unsplash.com/photo-1605000797499-95a51c5269ae?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'available', targetFund: 15000000, currentFund: 3500000, updates: [] }
                ],
                selectedLand: null,
                showFundModal: false, showAddLandModal: false, showUpdateModal: false,
                newLandLoc: '', newLandSize: '', newLandFund: '', newLandDesc: '',
                selectedCrop: 'c1', quantity: 100, updateText: '',
                cropOptions: [
                    { id: 'c1', name: 'Jagung Manis', price: 15000 },
                    { id: 'c2', name: 'Cabai Rawit', price: 20000 },
                    { id: 'c3', name: 'Tomat Cherry', price: 12000 }
                ],
                aiInsight: '', isAnalyzingAi: false,
                
                init() { 
                    this.$watch('activeTab', () => { setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50); }); 
                    this.$watch('selectedLand', () => { 
                        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50);
                        if(!this.selectedLand) { document.getElementById('main-scroll')?.scrollTo(0,0); }
                    });
                },
                login() { 
                    if(!this.username) this.username = this.isRegistering ? 'Pengguna Baru' : 'Investor'; 
                    this.isLoggedIn = true; 
                    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 100);
                },
                loginGoogle() { 
                    this.username = 'Ahmad Google'; 
                    this.isLoggedIn = true; 
                    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 100);
                },
                logout() { this.isLoggedIn = false; this.username = ''; },
                toggleRole() {
                    this.role = this.role === 'investor' ? 'landowner' : 'investor';
                    this.activeTab = this.role === 'investor' ? 'marketplace' : 'my-lands';
                },
                openLandDetail(land) { this.selectedLand = land; this.aiInsight = ''; },
                formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0); },
                calculateInvestment() {
                    const crop = this.cropOptions.find(c => c.id === this.selectedCrop);
                    return crop ? crop.price * this.quantity : 0;
                },
                handleGetAiInsight() {
                    this.isAnalyzingAi = true;
                    setTimeout(() => {
                        this.aiInsight = `**Rekomendasi AI:**\n• **Cabai Rawit:** ROI 30%. Sirkulasi air baik.\n• **Tomat Cherry:** ROI 20%. Panen cepat.`;
                        this.isAnalyzingAi = false;
                    }, 2000);
                }
            }));
        });
    </script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #e2e8f0; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="font-sans text-slate-800 antialiased" x-data="lahanApp()">

    <div class="w-full max-w-[430px] mx-auto bg-[#F8FAFC] min-h-[100dvh] relative shadow-2xl sm:border-x sm:border-slate-200 overflow-hidden flex flex-col">

        <div x-show="!isLoggedIn" class="flex-1 flex flex-col justify-center px-8 py-12 bg-white animate-in fade-in duration-300">
            <div class="text-center mb-10">
                <div class="w-16 h-16 rounded-3xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-500/20 mx-auto mb-4">
                    <i data-lucide="leaf" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Lahan<span class="text-emerald-600">Bersama</span></h1>
                <p class="text-slate-500 text-sm mt-1.5 font-medium" x-text="isRegistering ? 'Daftar akun baru' : 'Selamat datang kembali'"></p>
            </div>

            <form @submit.prevent="login" class="space-y-4">
                <div>
                    <input type="text" x-model="username" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none font-medium text-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 transition-all" placeholder="Nama Lengkap / Username" />
                </div>
                <div x-show="isRegistering" class="animate-in slide-in-from-top-2 duration-200">
                    <input type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none font-medium text-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 transition-all" placeholder="Alamat Email" />
                </div>
                <div>
                    <input type="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none font-medium text-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 transition-all" placeholder="Kata Sandi" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Masuk Sebagai</label>
                    <select x-model="role" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none font-medium text-sm focus:border-emerald-400">
                        <option value="investor">Pendana Lahan (Investor)</option>
                        <option value="landowner">Pemilik Lahan (Petani)</option>
                    </select>
                </div>
                
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-base active:bg-slate-800 shadow-xl shadow-slate-900/10 flex justify-center items-center gap-2 transform active:scale-[0.98] transition-all">
                    <span x-text="isRegistering ? 'Daftar Sekarang' : 'Masuk Platform'"></span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm font-medium text-slate-500">
                <span x-text="isRegistering ? 'Sudah punya akun?' : 'Belum punya akun?'"></span>
                <button @click="isRegistering = !isRegistering" class="text-emerald-600 font-bold ml-1 active:text-emerald-700" x-text="isRegistering ? 'Masuk di sini' : 'Daftar sekarang'"></button>
            </div>
        </div>

        <div x-show="isLoggedIn" class="flex-1 flex flex-col" class="animate-in fade-in duration-300">
            <header x-show="!selectedLand" class="bg-white/90 backdrop-blur-xl px-6 py-4 sticky top-0 z-40 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                        <i data-lucide="leaf" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-0.5">Selamat Pagi,</p>
                        <h2 class="text-sm font-black text-slate-800 leading-none" x-text="username"></h2>
                    </div>
                </div>
                <button @click="toggleRole" class="bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-xl text-[10px] font-bold border border-emerald-100 flex items-center gap-1 active:scale-95 transition-transform">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> <span x-text="role === 'investor' ? 'Pendana' : 'Petani'"></span>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto px-5 pt-6 pb-28" id="main-scroll">
                
                <div x-show="activeTab === 'marketplace' && !selectedLand">
                    <div class="mb-6">
                        <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-1">Eksplorasi</h1>
                        <p class="text-slate-500 text-sm font-medium">Temukan lahan dan mulai mendanai.</p>
                    </div>
                    <div class="space-y-5">
                        <template x-for="land in lands.filter(l => l.status === 'available')" :key="land.id">
                            <div @click="openLandDetail(land)" class="bg-white rounded-[1.8rem] p-2.5 shadow-sm border border-slate-100 cursor-pointer">
                                <div class="relative h-44 rounded-[1.2rem] overflow-hidden">
                                    <img :src="land.image" alt="Lahan" class="w-full h-full object-cover" />
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-80"></div>
                                    <div class="absolute top-3 right-3">
                                        <span class="px-3 py-1 rounded-full text-[10px] font-black shadow-lg backdrop-blur-md bg-white/90 text-emerald-700">TERBUKA</span>
                                    </div>
                                    <div class="absolute bottom-3 left-3 right-3">
                                        <h3 class="font-bold text-lg text-white line-clamp-1 shadow-sm" x-text="land.owner"></h3>
                                        <div class="flex items-center gap-1.5 text-[11px] text-slate-200 font-medium mt-1">
                                            <i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="`${land.location} • ${land.size}`"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="p-3.5">
                                    <div class="flex justify-between items-end mb-2">
                                        <div>
                                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Target Dana</p>
                                            <span class="text-base font-black text-slate-800" x-text="formatRupiah(land.targetFund)"></span>
                                        </div>
                                        <span class="text-xs font-black text-emerald-600" x-text="`${Math.round((land.currentFund / land.targetFund) * 100)}%`"></span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                        <div class="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full" :style="`width: ${(land.currentFund / land.targetFund) * 100}%`"></div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="activeTab === 'my-lands' && !selectedLand">
                    <div class="mb-6 flex justify-between items-end">
                        <div>
                            <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-1">Lahan Saya</h1>
                            <p class="text-slate-500 text-sm font-medium">Kelola aset pertanian Anda.</p>
                        </div>
                    </div>
                    <div class="space-y-5">
                         <template x-for="land in lands.filter(l => l.owner === username || l.owner === 'Saya' || l.owner === 'Bapak Budi')" :key="land.id">
                            <div @click="openLandDetail(land)" class="bg-white rounded-[1.8rem] p-2.5 shadow-sm border border-slate-100 cursor-pointer">
                                <div class="relative h-44 rounded-[1.2rem] overflow-hidden">
                                    <img :src="land.image" alt="Lahan" class="w-full h-full object-cover" />
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-80"></div>
                                    <div class="absolute top-3 right-3">
                                        <span :class="land.status === 'available' ? 'bg-white/90 text-emerald-700' : 'bg-blue-500/90 text-white'" class="px-3 py-1 rounded-full text-[10px] font-black shadow-lg backdrop-blur-md" x-text="land.status === 'available' ? 'TERBUKA' : 'BERJALAN'"></span>
                                    </div>
                                    <div class="absolute bottom-3 left-3 right-3">
                                        <h3 class="font-bold text-lg text-white line-clamp-1 shadow-sm" x-text="land.owner"></h3>
                                        <div class="flex items-center gap-1.5 text-[11px] text-slate-200 font-medium mt-1">
                                            <i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="`${land.location} • ${land.size}`"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="p-3.5">
                                    <div class="flex justify-between items-end mb-2">
                                        <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Kebutuhan Dana</p><span class="text-base font-black text-slate-800" x-text="formatRupiah(land.targetFund)"></span></div>
                                        <span class="text-xs font-black text-emerald-600" x-text="`${Math.round((land.currentFund / land.targetFund) * 100)}%`"></span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                        <div class="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full" :style="`width: ${(land.currentFund / land.targetFund) * 100}%`"></div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="activeTab === 'my-investments' && !selectedLand">
                    <div class="mb-6">
                        <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-1">Portofolio</h1>
                        <p class="text-slate-500 text-sm font-medium">Pantau aset yang Anda danai.</p>
                    </div>
                    <div class="space-y-5">
                         <template x-for="land in lands.filter(l => l.status === 'funded')" :key="land.id">
                            <div @click="openLandDetail(land)" class="bg-white rounded-[1.8rem] p-2.5 shadow-sm border border-slate-100 cursor-pointer">
                                <div class="relative h-44 rounded-[1.2rem] overflow-hidden">
                                    <img :src="land.image" alt="Lahan" class="w-full h-full object-cover" />
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-80"></div>
                                    <div class="absolute top-3 right-3">
                                        <span class="bg-blue-500/90 text-white px-3 py-1 rounded-full text-[10px] font-black shadow-lg backdrop-blur-md">BERJALAN</span>
                                    </div>
                                    <div class="absolute bottom-3 left-3 right-3">
                                        <h3 class="font-bold text-lg text-white line-clamp-1 shadow-sm" x-text="land.owner"></h3>
                                        <div class="flex items-center gap-1.5 text-[11px] text-slate-200 font-medium mt-1">
                                            <i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="`${land.location} • ${land.size}`"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="p-3.5">
                                    <div class="flex justify-between items-end mb-2">
                                        <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Dana Disuntik</p><span class="text-base font-black text-slate-800" x-text="formatRupiah(land.targetFund)"></span></div>
                                        <span class="text-xs font-black text-emerald-600">100%</span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="selectedLand" class="absolute inset-0 bg-[#F8FAFC] z-50 overflow-y-auto pb-32 animate-in slide-in-from-right-8 duration-300">
                    <div class="relative h-[45vh] w-full">
                        <img :src="selectedLand?.image" alt="Lahan" class="w-full h-full object-cover" />
                        <div class="absolute inset-0 bg-gradient-to-b from-slate-900/60 via-transparent to-slate-900/80"></div>
                        
                        <button @click="selectedLand = null" class="absolute top-6 left-5 bg-white/20 backdrop-blur-xl text-white p-3 rounded-full active:scale-95">
                            <i data-lucide="arrow-left" class="w-5 h-5"></i>
                        </button>

                        <div class="absolute bottom-10 left-6 right-6">
                            <h1 class="text-3xl font-black text-white tracking-tight mb-1" x-text="`Lahan ${selectedLand?.owner || ''}`"></h1>
                            <p class="text-slate-300 text-sm font-medium flex items-center gap-1.5">Luas: <span class="text-white font-bold" x-text="selectedLand?.size"></span></p>
                        </div>
                    </div>

                    <div class="relative z-10 bg-[#F8FAFC] -mt-6 rounded-t-[2rem] px-6 py-8 space-y-6">
                        <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 p-5">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Target Dana</p>
                            <h2 class="text-3xl font-black text-slate-800 mb-4" x-text="formatRupiah(selectedLand?.targetFund)"></h2>
                            <div class="w-full bg-slate-100 rounded-full h-2.5 mb-2">
                                <div class="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full" :style="`width: ${((selectedLand?.currentFund || 0) / (selectedLand?.targetFund || 1)) * 100}%`"></div>
                            </div>
                        </div>

                        <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 p-6">
                            <h3 class="text-base font-black text-slate-800 mb-3 flex items-center gap-2">
                                <i data-lucide="info" class="w-5 h-5 text-slate-400"></i> Detail Lahan
                            </h3>
                            <p class="text-slate-600 text-sm leading-relaxed" x-text="selectedLand?.description"></p>
                        </div>

                        <template x-if="selectedLand?.status === 'available' && role === 'investor'">
                            <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-[1.5rem] p-6 border border-indigo-100 shadow-sm relative overflow-hidden">
                                <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-200 rounded-full blur-[40px] opacity-40"></div>
                                <div class="relative z-10">
                                    <div class="flex items-center gap-3 mb-4">
                                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                                            <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                                        </div>
                                        <div>
                                            <h3 class="text-base font-black text-slate-800">CerdasAI</h3>
                                            <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Rekomendasi Tanaman</p>
                                        </div>
                                    </div>
                                    
                                    <template x-if="!aiInsight && !isAnalyzingAi">
                                        <div>
                                            <p class="text-slate-500 text-xs font-medium mb-4 leading-relaxed">Analisis potensi lahan ini menggunakan AI untuk rekomendasi komoditas paling menguntungkan.</p>
                                            <button @click="handleGetAiInsight" class="w-full bg-indigo-900 text-white py-3 rounded-xl font-bold text-sm active:bg-indigo-800 shadow-md">Analisis Sekarang</button>
                                        </div>
                                    </template>

                                    <template x-if="isAnalyzingAi">
                                        <div class="flex flex-col items-center justify-center py-6 text-indigo-600 space-y-3">
                                            <i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i>
                                            <span class="text-xs font-bold animate-pulse">Memproses data agronomi...</span>
                                        </div>
                                    </template>

                                    <template x-if="aiInsight">
                                        <div class="text-slate-700 text-xs leading-relaxed whitespace-pre-wrap font-medium bg-white/50 p-4 rounded-xl border border-indigo-100" x-html="aiInsight"></div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div x-show="selectedLand?.status === 'available' && role === 'investor'" class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 pb-safe z-50">
                        <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-base shadow-xl flex justify-center items-center gap-2 transform active:scale-[0.98] transition-all">
                            <i data-lucide="wallet" class="w-5 h-5"></i> Danai Sekarang
                        </button>
                    </div>
                </div>
            </main>

            <nav x-show="!selectedLand" class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-white/95 backdrop-blur-2xl border-t border-slate-100/60 pb-safe z-40 rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)]">
                <div class="flex justify-around items-center px-6 py-2">
                    <button @click="activeTab = 'marketplace'" class="flex flex-col items-center justify-center w-16 h-14 relative">
                        <div :class="activeTab === 'marketplace' ? 'text-emerald-600 scale-110' : 'text-slate-400'">
                            <i data-lucide="compass" class="w-6 h-6"></i>
                        </div>
                        <span :class="activeTab === 'marketplace' ? 'text-emerald-600 font-bold opacity-100' : 'text-transparent opacity-0'" class="text-[10px] mt-1 absolute bottom-1 translate-y-3">Pasar</span>
                    </button>
                    
                    <button x-show="role === 'landowner'" @click="activeTab = 'my-lands'" class="flex flex-col items-center justify-center w-16 h-14 relative">
                        <div :class="activeTab === 'my-lands' ? 'text-emerald-600 scale-110' : 'text-slate-400'">
                            <i data-lucide="map" class="w-6 h-6"></i>
                        </div>
                        <span :class="activeTab === 'my-lands' ? 'text-emerald-600 font-bold opacity-100' : 'text-transparent opacity-0'" class="text-[10px] mt-1 absolute bottom-1 translate-y-3">Lahan</span>
                    </button>

                    <button x-show="role === 'investor'" @click="activeTab = 'my-investments'" class="flex flex-col items-center justify-center w-16 h-14 relative">
                        <div :class="activeTab === 'my-investments' ? 'text-emerald-600 scale-110' : 'text-slate-400'">
                            <i data-lucide="pie-chart" class="w-6 h-6"></i>
                        </div>
                        <span :class="activeTab === 'my-investments' ? 'text-emerald-600 font-bold opacity-100' : 'text-transparent opacity-0'" class="text-[10px] mt-1 absolute bottom-1 translate-y-3">Aset</span>
                    </button>

                    <button @click="logout" class="flex flex-col items-center justify-center w-16 h-14 relative">
                        <div class="text-slate-400 active:text-red-500 transition-all duration-300">
                            <i data-lucide="log-out" class="w-6 h-6"></i>
                        </div>
                    </button>
                </div>
            </nav>
        </div>

    </div>
